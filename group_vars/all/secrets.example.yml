# Copy this file to group_vars/all/secrets.yml and fill in the real values.
# Keep the real file out of Git.
#
# Notes:
# - If a service is intentionally unused, you can still leave a placeholder here,
#   but any enabled service in weewx.conf must have a real credential.
# - CWOP passcode may remain "replace_me" for a weather-station CWOP ID that does
#   not use an amateur-radio APRS passcode.
# - Windy uses the station password from stations.windy.com, not a general API key.

# Sudo passwords used by Ansible become on each host
edge_sudo_password: CHANGE_ME
web_sudo_password: CHANGE_ME

# AWEKAS uploader
weewx_awekas_username: CHANGE_ME
weewx_awekas_password: CHANGE_ME

# CWOP uploader
weewx_cwop_station: GW0000
weewx_cwop_passcode: replace_me

# PWSweather uploader
weewx_pwsweather_station: CHANGE_ME
weewx_pwsweather_password: CHANGE_ME

# UK Met Office WOW uploader
weewx_wow_station: CHANGE_ME
weewx_wow_password: CHANGE_ME

# Weather Underground uploader
weewx_wunderground_station: CHANGE_ME
weewx_wunderground_password: CHANGE_ME
weewx_wunderground_api_key: replace_me

# Windy uploader
windy_station_id: CHANGE_ME
windy_station_password: CHANGE_ME
