- name: Install web packages
  ansible.builtin.apt:
    name:
      - certbot
      - nginx
      - postgresql
      - python3-certbot-nginx
      - sqlite3
      - python3
    state: present
    update_cache: true

- name: Ensure web directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ web_root }}"
      owner: "{{ web_app_user }}"
      group: "{{ web_app_group }}"
      mode: "0755"
    - path: "{{ web_status_dir }}"
      owner: "{{ web_app_user }}"
      group: "{{ web_app_group }}"
      mode: "0755"
    - path: "/home/{{ web_app_user }}/.local/state/weewx-postgres"
      owner: "{{ web_app_user }}"
      group: "{{ web_app_group }}"
      mode: "0755"

- name: Deploy web templates
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - src: nginx-site.conf.j2
      dest: "/etc/nginx/sites-available/{{ web_nginx_site_name }}"
      owner: root
      group: root
      mode: "0644"
    - src: replicate_weewx_archive.py.j2
      dest: /usr/local/bin/replicate_weewx_archive.py
      owner: root
      group: root
      mode: "0755"
    - src: website-freshness.service.j2
      dest: /etc/systemd/system/website-freshness.service
      owner: root
      group: root
      mode: "0644"
    - src: website-freshness.timer.j2
      dest: /etc/systemd/system/website-freshness.timer
      owner: root
      group: root
      mode: "0644"
    - src: weewx-postgres-replication.service.j2
      dest: /etc/systemd/system/weewx-postgres-replication.service
      owner: root
      group: root
      mode: "0644"
    - src: weewx-postgres-replication.timer.j2
      dest: /etc/systemd/system/weewx-postgres-replication.timer
      owner: root
      group: root
      mode: "0644"

- name: Deploy web static scripts
  ansible.builtin.copy:
    src: usr/local/bin/update-web-status.sh
    dest: /usr/local/bin/update-web-status.sh
    owner: root
    group: root
    mode: "0755"

- name: Enable nginx site
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ web_nginx_site_name }}"
    dest: "/etc/nginx/sites-enabled/{{ web_nginx_site_name }}"
    state: link

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Validate nginx config
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Ensure PostgreSQL role exists
  become_user: postgres
  ansible.builtin.shell: |
    psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='{{ web_postgres_role }}'" | grep -q 1 || createuser "{{ web_postgres_role }}"
  args:
    executable: /bin/bash
  changed_when: false

- name: Ensure PostgreSQL database exists
  become_user: postgres
  ansible.builtin.shell: |
    psql -tAc "SELECT 1 FROM pg_database WHERE datname='{{ web_postgres_db }}'" | grep -q 1 || createdb -O "{{ web_postgres_role }}" "{{ web_postgres_db }}"
  args:
    executable: /bin/bash
  changed_when: false

- name: Reload systemd on web
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start web services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - nginx.service
    - postgresql.service
    - website-freshness.timer
    - weewx-postgres-replication.timer
